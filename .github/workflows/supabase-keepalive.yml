name: Supabase keepalive

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      SUPABASE_URL: https://ygzhbtnzenrmkyisggry.supabase.co
      SUPABASE_ANON_KEY: sb_publishable_DrEcabJBv9qsW6hSite4ww_RcW0FDp1

    steps:
      - name: Ping Supabase REST API
        run: |
          set -euo pipefail

          curl --fail --silent --show-error \
            --retry 3 \
            --retry-delay 10 \
            --connect-timeout 10 \
            --max-time 30 \
            "${SUPABASE_URL}/rest/v1/rsvp_totais_gerais?select=total_convidados&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}"

          echo "Supabase ping concluido."
