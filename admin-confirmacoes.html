<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Confirmações | Miguel & Letícia</title>
    <meta
      name="description"
      content="Painel simples de acompanhamento das confirmações."
    />
    <link rel="icon" href="assets/images/monogram-ml-green.png" type="image/png" />
    <link rel="stylesheet" href="css/confirmacoes.css?v=admin-panel-1" />
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="js/supabase-config.js"></script>
    <script defer src="js/admin-confirmacoes.js?v=admin-panel-1"></script>
  </head>
  <body>
    <a class="page-back" href="index.html">voltar</a>

    <main class="confirm-shell admin-shell">
      <section class="admin-login" id="admin-login" aria-labelledby="admin-login-title">
        <img
          class="admin-login-logo"
          src="assets/images/monogram-ml-green.png"
          alt=""
          aria-hidden="true"
        />
        <h1 id="admin-login-title">Admin</h1>
        <p class="admin-small">
          Digite a senha do casal para acompanhar as confirmações.
        </p>
        <label class="sr-only" for="admin-password">Senha</label>
        <input
          id="admin-password"
          type="password"
          placeholder="senha"
          autocomplete="current-password"
        />
        <button id="admin-enter-button" type="button">Entrar</button>
        <p class="status-message" id="admin-login-status" aria-live="polite"></p>
      </section>

      <section class="admin-dashboard" id="admin-dashboard" aria-labelledby="admin-title">
        <header class="admin-header">
          <div>
            <h1 id="admin-title">Confirmações</h1>
            <p class="admin-small" id="admin-updated-at"></p>
          </div>
          <div class="admin-toolbar">
            <button id="refresh-admin-button" type="button">Atualizar</button>
            <button id="logout-admin-button" type="button">Sair</button>
          </div>
        </header>

        <section class="summary-grid summary-grid--general" aria-label="Resumo geral">
          <article class="summary-card">
            <span class="admin-small">Confirmados</span>
            <strong id="summary-confirmed">0</strong>
          </article>
          <article class="summary-card">
            <span class="admin-small">Pendentes</span>
            <strong id="summary-pending">0</strong>
          </article>
          <article class="summary-card">
            <span class="admin-small">Não irão</span>
            <strong id="summary-not-going">0</strong>
          </article>
          <article class="summary-card">
            <span class="admin-small">Total de convidados</span>
            <strong id="summary-total-guests">0</strong>
          </article>
        </section>

        <p class="status-message" id="admin-status" aria-live="polite"></p>
        <section class="admin-status-board" aria-label="Lista de convidados por status">
          <article class="admin-status-column admin-status-column--confirmed">
            <div class="admin-column-header">
              <span>Confirmados</span>
              <strong id="column-confirmed-count">0</strong>
            </div>
            <div class="admin-list" id="confirmed-list"></div>
          </article>

          <article class="admin-status-column admin-status-column--pending">
            <div class="admin-column-header">
              <span>Pendentes</span>
              <strong id="column-pending-count">0</strong>
            </div>
            <div class="admin-list" id="pending-list"></div>
          </article>

          <article class="admin-status-column admin-status-column--not-going">
            <div class="admin-column-header">
              <span>Não irão</span>
              <strong id="column-not-going-count">0</strong>
            </div>
            <div class="admin-list" id="not-going-list"></div>
          </article>
        </section>
      </section>
    </main>
  </body>
</html>
